  key: "test-session-key-for-cookies"

workers:
  workers: 2
  queue_size: 10
  github_timeout: 10s

# SQS Configuration for testing
sqs:
  enabled: true
  region: "us-east-1"
  endpoint_url: "http://localhost:4566"  # LocalStack
  queues:
    installation: "http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/github-installation"
    pull_request: "http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/github-pull-request"
    pull_request_review: "http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/github-pull-request-review"
    issue_comment: "http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/github-issue-comment"
    status: "http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/github-status"
    check_run: "http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/github-check-run"
  
  # Event routing for testing different scenarios
  event_routing:
    pull_request: "both"      # Test both HTTP and SQS
    issue_comment: "both"     # Test both HTTP and SQS
    status: "sqs"             # SQS only
    check_run: "http"         # HTTP only
  
  # Default worker configuration
  workers_per_queue: 2
  
  # Per-queue worker allocation for testing
  queue_workers:
    installation: 1      # Low volume
    pull_request: 3      # Medium volume  
    pull_request_review: 2  # Medium volume
    issue_comment: 2     # Medium volume
    status: 5            # High volume - status events are frequent
    check_run: 3         # Medium-high volume
  max_messages: 5
  visibility_timeout: 30
  wait_time_seconds: 5
  shutdown_timeout: 10s
  
  # Retry configuration
  enable_retry: true
  max_retries: 2

# Test options (minimal for testing)
options:
  policy_path: ".policy.yml"
  shared_repository: ".github"
  status_check_context: "policy-bot-test"
